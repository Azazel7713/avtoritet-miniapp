<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#111315" />
    <title>Avtoritet: Dvizh</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <script src="loading.js" defer></script>
  </head>
  <body>
    <main class="app-shell move-shell">
      <section class="arena-topbar move-topbar">
        <a class="back-link" href="index.html" aria-label="Geri">‹</a>
        <div>
          <p class="eyebrow">Dvizh</p>
          <h1>Oyunçu Hərəkəti</h1>
        </div>
      </section>

      <section class="move-board">
        <div class="move-hero">
          <img id="moveAvatar" src="assets/appearances/appearance-01.png" alt="" />
          <div>
            <p id="moveName">Oyunçu</p>
            <strong id="moveRank">Yeni oyunçu</strong>
          </div>
        </div>
        <div class="move-grid" id="moveGrid"></div>
        <div class="dock-xp">
          <div class="xp-meta">
            <span id="moveXpText">XP 0/60</span>
            <strong id="moveXpLeft">+60</strong>
          </div>
          <div class="bar xp-bar"><span id="moveXpBar"></span></div>
        </div>
      </section>
    </main>
    <script src="moves-data.js"></script>
    <script src="moves.js"></script>
  </body>
</html>
